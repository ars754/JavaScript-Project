<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Local Storage Counter</title>
    <link rel="stylesheet" href="localstoragecounter.css"/>
    <!--Bootstrap css bundle-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Bootstrap icons bundle-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/bootstrap-icons.svg" rel="stylesheet"/>
  </head>
  <body>
    <h1><i><b>A Counter with Reset and Save</b></i></h1><hr/>
    <p>In this project we will build a counter with buttons to:<p>
    <h2>JavaScript Project</h2>
    <h3>Counter</h3>
    <p id="count">0</p>
    <div class="btn btn-group">
      <button onclick="increaseCount()">+</button>
      <button onclick="decreaseCount()">-</button>
      <button onclick="resetCount()">Reset</button>
      <button onclick="saveCount()">Save</button>
      <button onclick="loadCount()">Load</button>
    </div>
    <!--Javascript-->
    <!--Bootstrap js bundle-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="localstoragecounter.js" charset="UTF-8"></script>
  </body>
</html>
